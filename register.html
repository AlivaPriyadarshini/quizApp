<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz App - Register</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card fade-in">
      <h1>Register</h1>
      <p>Create your account to access the quiz</p>

      <form id="registerForm">
        <div class="input-group">
          <label for="registerUsername">Username</label>
          <input type="text" id="registerUsername" placeholder="Enter your username" />
        </div>

        <div class="input-group">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" placeholder="Enter your email" />
        </div>

        <div class="input-group">
          <label for="registerPassword">Password</label>
          <input type="password" id="registerPassword" placeholder="Enter your password" />
        </div>

        <button type="submit" class="btn">Register</button>
        <p id="registerMessage" class="message"></p>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="index.html">Login</a>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
